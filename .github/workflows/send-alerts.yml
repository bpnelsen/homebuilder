name: Send Daily Alerts

on:
  schedule:
    # Run daily at 7 AM MST (2 PM UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Send alerts via API
        run: |
          echo "🚀 Starting alert send process..."
          
          # Define API URL
          API_URL="https://homebuilder.vercel.app/api"
          API_KEY="${{ secrets.ALERTS_API_KEY }}"
          
          # In a real scenario, you would:
          # 1. Query Supabase for new filings not yet sent
          # 2. Call /api/alerts/send-10k for each new filing
          # 3. Call /api/alerts/send-earnings for each new call
          
          # For now, this is a placeholder that shows the structure
          echo "✅ Alert workflow would query Supabase and send emails"
          echo "   Filings marked with alert_sent: false would be sent"
          echo "   Earnings calls marked with alert_sent: false would be sent"
      
      - name: Log result
        if: always()
        run: echo "✅ Alert send workflow completed"
